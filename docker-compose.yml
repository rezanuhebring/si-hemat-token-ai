services:
  open-webui:
    build:
      context: .
      dockerfile: ./openwebui/Dockerfile
    image: open-webui-compat:local
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
      tika:
        condition: service_healthy
      chromadb:
        condition: service_started
      openwebui-tools:
        condition: service_healthy
    ports:
      - "3030:8080"
    environment:
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      ENABLE_OPENAI_API: "true"
      OPENAI_API_BASE_URL: http://openwebui-tools:9099/v1
      OPENAI_API_KEY: ${OPENWEBUI_LITELLM_KEY}
      RAG_EMBEDDING_ENGINE: openai
      RAG_OPENAI_API_BASE_URL: http://openwebui-tools:9099/v1
      RAG_OPENAI_API_KEY: ${OPENWEBUI_LITELLM_KEY}
      RAG_EMBEDDING_MODEL: embed-model
      CONTENT_EXTRACTION_ENGINE: tika
      TIKA_SERVER_URL: http://tika:9998
      CHROMA_HTTP_HOST: chromadb
      CHROMA_HTTP_PORT: "8000"
      CHROMA_TENANT: default_tenant
      CHROMA_DATABASE: default_database
      RAG_TOP_K: "16"
      RAG_TOP_K_RERANKER: "16"
      RAG_RERANKING_MODEL: ${RAG_RERANKING_MODEL:-}
      RAG_RELEVANCE_THRESHOLD: "0.0"
      ENABLE_RAG_HYBRID_SEARCH: "true"
      ENABLE_RAG_QUERY_GENERATION: "false"
      RAG_TEXT_SPLITTER: token
      RAG_FILE_MAX_SIZE: "200"
      RAG_FILE_MAX_COUNT: "20"
      DEFAULT_USER_ROLE: pending
      BYPASS_MODEL_ACCESS_CONTROL: "false"
      ENABLE_DIRECT_CONNECTIONS: "false"
      ENABLE_OPENAI_API_PASSTHROUGH: "false"
      ENABLE_PERSISTENT_CONFIG: "false"
      ENABLE_API_KEYS: "true"
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - ai-private
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  litellm:
    build:
      context: .
      dockerfile: ./litellm/Dockerfile
    image: litellm-with-pillow:local
    container_name: litellm
    restart: unless-stopped
    depends_on:
      litellm-db:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@litellm-db:5432/litellm
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - ai-private
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s

  litellm-db:
    image: postgres:16
    container_name: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    networks:
      - ai-private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 15s
      timeout: 5s
      retries: 10

  tika:
    image: apache/tika:latest-full
    container_name: tika
    restart: unless-stopped
    expose:
      - "9998"
    networks:
      - ai-private
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9998/tika >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 20s

  chromadb:
    image: chromadb/chroma:1.5.2
    container_name: chromadb
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - ai-private
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/8000'"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 20s

  openwebui-tools:
    build:
      context: .
      dockerfile: ./tools/Dockerfile
    container_name: openwebui-tools
    restart: unless-stopped
    depends_on:
      tika:
        condition: service_healthy
      chromadb:
        condition: service_started
      litellm:
        condition: service_healthy
    ports:
      - "127.0.0.1:9099:9099"
    environment:
      TIKA_SERVER_URL: http://tika:9998
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_API_KEY: ${OPENWEBUI_LITELLM_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OPENWEBUI_BASE_URL: http://open-webui:8080
      CHROMA_BASE_URL: http://chromadb:8000
      KNOWLEDGE_ROOT: /data/knowledge
      MEMORY_FILE_PATH: /data/memory/memory.json
      SUMMARY_MODEL: thinker-pro
      RERANK_MODEL: BAAI/bge-reranker-v2-m3
    volumes:
      - knowledge-data:/data/knowledge
      - memory-data:/data/memory
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ai-private
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9099/healthz', timeout=5).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    gpus: all
    environment:
      OLLAMA_CONTEXT_LENGTH: "32768"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_LOAD_TIMEOUT: "20m"
    profiles:
      - local-models
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ai-private
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 40s

networks:
  ai-private:
    driver: bridge

volumes:
  open-webui-data:
  litellm-db-data:
  ollama-data:
  chroma-data:
  knowledge-data:
  memory-data:
